services:
  postgres-db:
    image: postgres:16-alpine
    container_name: sonus-postgres-metadata-db
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    ports:
      - "${POSTGRES_DB_PORT}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - streaming-network

  minio:
    image: minio/minio:latest
    container_name: sonus-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio-data:/data
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: sonus-kafka
    environment:
      - KAFKA_CLUSTER_ID=lkorDA4qT6W1K_dk0LHvtg
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@127.0.0.1:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LOG_DIRS=/tmp/logs
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092,INTERNAL://kafka:9094
    ports:
      - "0.0.0.0:9092:9092"

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: sonus-kafka-ui
    ports:
      - "8080:8080"
    restart: "always"
    environment:
      KAFKA_CLUSTERS_0_NAME: "lkorDA4qT6W1K_dk0LHvtg"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      - kafka

  mongodb:
    image: mongo:latest
    container_name: sonus-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb-data:/data/db
    networks:
      - streaming-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.6
    container_name: sonus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - streaming-network

  # My Microservices

  user-auth-service:
    build: ./user-auth-service
    container_name: sonus-user-auth-service
    ports:
      - "8081:8080"
    environment:
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
    depends_on:
      - postgres-db
    networks:
      - streaming-network

  streaming-service:
    build: ./streaming-service
    container_name: sonus-streaming-service
    ports:
      - "8082:8080"
    environment:
      - MINIO_URL=${MINIO_URL}
      - MINIO_ACCESSKEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRETKEY=${MINIO_SECRET_KEY}
    depends_on:
      - minio
      - kafka
    networks:
      - streaming-network

  artist-service:
    build: ./artist-service
    container_name: sonus-artist-service
    ports:
      - "8083:8080"
    environment:
      - MONGO_URI=mongodb://sonus-mongo:27017/artist_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - streaming-network

  analytics-service:
    build: ./analytics-service
    container_name: sonus-analytics-service
    ports:
      - "8084:8080"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - ELASTICSEARCH_URIS=http://sonus-elasticsearch:9200
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - kafka
      - elasticsearch
    networks:
      - streaming-network

volumes:
  kafka_data:
    driver: local
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  streaming-network:
    driver: bridge
